<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Admin Account — Feeds Kenya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    .admin-auth { min-height: 100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:var(--primary-dark); }
    .admin-auth-card { background:var(--surface); border-radius:var(--radius-lg); padding:40px; width:100%; max-width:480px; box-shadow:var(--shadow-xl); }
  </style>
</head>
<body>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="flash-container" style="top:16px;">
    {% for category, message in messages %}
    <div class="flash flash-{{ category }}"><span>{{ message }}</span><button class="flash-close">✕</button></div>
    {% endfor %}
  </div>
  {% endif %}
{% endwith %}

<div class="admin-auth">
  <div class="admin-auth-card">
    <div style="text-align:center;margin-bottom:28px;">
      <h2 style="font-size:1.5rem;">Create Admin Account</h2>
      <p style="font-size:0.875rem;margin-top:4px;">Set up a new administrator account</p>
    </div>
    <form method="POST" action="{{ url_for('admin_signup') }}" enctype="multipart/form-data" style="display:flex;flex-direction:column;gap:16px;">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" type="text" name="username" placeholder="Admin username" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" type="tel" name="phone_number" placeholder="+254...">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" name="email" placeholder="admin@feedskenya.com" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" name="password" placeholder="Password" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm</label>
          <input class="form-input" type="password" name="confirm_password" placeholder="Repeat" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Profile Picture <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
        <input class="form-input" type="file" name="profile_picture" accept="image/*" style="padding:8px;">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Admin Account</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:0.85rem;color:var(--text-muted);">
      <a href="{{ url_for('admin_login') }}" style="color:var(--primary);">← Back to admin login</a>
    </p>
  </div>
</div>
<script>document.querySelectorAll('.flash-close').forEach(b => b.addEventListener('click', () => b.closest('.flash').remove()));</script>
</body>
</html>
